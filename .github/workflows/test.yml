name: Test Workflow

on: [ push, pull_request ]

jobs:
  test_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: 3

      - name: Upgrade PIP
        run: |
          python -m pip install --upgrade pip

      - name: Install coverage, flake8, and isort
        run: |
          python -m pip install coverage flake8 isort

      - name: Create virtual display
        run: |
          sudo apt-get install -y xvfb
          Xvfb :1 -screen 0 1600x1200x24 &

      - name: Run tests
        run: |
          find tests -name 'test_*.py' -exec sh -c \
            'DISPLAY=:1.0 PYTHONPATH="sources:tests" python -m coverage run --append --branch "{}"' \;
          python -m coverage report --omit='tests/**/test_*.py' --show-missing

      - name: Check coding style
        run: |
          python -m flake8 . --max-line-length 120 --max-doc-length 120 --exit-zero; echo
          python -m isort . --line-length 120 --diff
